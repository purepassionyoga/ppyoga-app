<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pose Library · Pure Passion Yoga</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("ppy-theme");var m=window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches;var dark=t?t==="dark":m;document.documentElement.setAttribute("data-theme",dark?"dark":"light");}catch(e){}})();</script>
<style>
  :root{
    --rose:#C8A0A6; --roseTitle:#C8A0A6; --roseDeep:#A87C83; --sage:#a8ad91;
    --taupe:#9C8579; --body:#6C7682; --paper:#fff; --stage:#FBF8F6; --line:#EFE6E8;
    --lineDk:#E2D7D9; --chipBg:#F6ECEF; --chipFg:#A87C83; --sageBg:#EEF1E4; --sageFg:#7E8466;
    --font-head:'Playfair Display',Georgia,serif; --font-body:'Poppins',system-ui,sans-serif;
  }
  /* ===== Dark mode palette ===== */
  :root[data-theme="dark"]{
    --paper:#241c21 !important; --stage:#191317 !important;
    --body:#E8DEE3 !important; --taupe:#B49EA8 !important;
    --line:#352b32 !important; --lineDk:#41343c !important;
    --chipBg:#33262d !important; --chipFg:#E2C2C9 !important;
    --sageBg:#2a2f23 !important; --sageFg:#AEB593 !important;
    --roseDeep:#D9AAB1 !important;
    --ppy-bg:#191317 !important; --ppy-surface:#241c21 !important;
    --ppy-ink:#E8DEE3 !important; --ppy-muted:#B49EA8 !important;
    --ppy-line:#352b32 !important; --ppy-lineDk:#41343c !important;
    --ppy-chip:#33262d !important; --ppy-accentDk:#D9AAB1 !important;
    --bg:#191317 !important; --card:#241c21 !important; --field:#2c2229 !important;
    --ink:#E8DEE3 !important; --muted:#B49EA8 !important;
  }
  :root[data-theme="dark"] .ppy-header{background:rgba(25,19,23,.92) !important}
  :root[data-theme="dark"] .ppy-mobile{background:var(--ppy-surface) !important}
  :root[data-theme="dark"] .ppy-btn.ghost,:root[data-theme="dark"] .ppy-btn.admin{background:var(--ppy-surface) !important}
  .ppy-theme{padding:0 !important;width:38px;height:38px;justify-content:center}
  .ppy-theme svg{width:18px;height:18px}
  *{box-sizing:border-box}
  body{margin:0;background:var(--stage);color:var(--body);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  .serif{font-family:var(--font-head)}
  a{color:inherit;text-decoration:none}

  header{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .bar{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-family:var(--font-head);font-weight:700;font-size:22px;color:var(--roseDeep);letter-spacing:.02em}
  nav{display:flex;gap:18px;font-size:13px;color:var(--taupe)}
  nav a.active{color:var(--rose);font-weight:600}

  .wrap{max-width:1200px;margin:0 auto;padding:24px}
  .search{width:100%;padding:12px 16px;border:1px solid var(--lineDk);border-radius:12px;font:inherit;font-size:14px;outline:none;background:var(--paper);color:var(--body);margin-bottom:18px}
  .frow{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .flabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--taupe);width:96px;flex:0 0 auto;padding-top:7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
  .chip{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:var(--paper);color:var(--body);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--rose)}
  .chip.on{background:var(--rose);color:#fff;border-color:var(--rose)}

  .count{color:var(--taupe);font-size:13px;margin:14px 0 18px}
  .potd{display:flex;align-items:center;gap:14px;background:var(--chipBg);border:1px solid var(--line);border-radius:16px;padding:12px 16px;margin-bottom:18px}
  .potd-th{width:56px;height:56px;border-radius:12px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;flex:0 0 auto}
  .potd-th img{max-width:100%;max-height:100%;object-fit:contain}
  .potd-body{flex:1}
  .potd-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--roseDeep)}
  .potd-name{font-family:var(--font-head);color:var(--rose);font-size:18px}
  .potd-san{font-family:var(--font-head);font-style:italic;color:var(--sage);font-size:13px}
  .potd-btn{background:var(--rose);color:#fff;border:none;border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer}
  .potd-btn:hover{background:var(--roseDeep)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.18s;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(166,100,114,.12);border-color:var(--lineDk)}
  .thumb{height:140px;display:flex;align-items:center;justify-content:center;background:var(--paper);border-bottom:1px solid var(--line);font-size:50px}
  .thumb img{max-height:100%;max-width:100%;object-fit:contain}
  .cbody{padding:12px 14px 14px}
  .cname{font-family:var(--font-head);font-weight:600;font-size:16px;color:var(--rose);line-height:1.2}
  .csans{font-family:var(--font-head);font-style:italic;color:var(--sage);font-size:13px;margin-top:2px}
  .crow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11.5px;color:var(--taupe)}
  .badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500}
  .heart{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--rose);font-size:15px}
  .heart.on{background:var(--rose);color:#fff;border-color:var(--rose)}

  .state{padding:60px 20px;text-align:center;color:var(--taupe)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(58,38,44,.42);display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow:auto;z-index:50}
  .modal{background:var(--paper);max-width:920px;width:100%;border-radius:26px;margin:16px 0;overflow:hidden;animation:in .28s cubic-bezier(.2,.7,.2,1)}
  @keyframes in{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.modal{animation:none}}
  .mtop{position:sticky;top:0;background:var(--paper);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);display:flex;justify-content:flex-end;padding:12px 18px;z-index:2}
  .close{background:#CDA0A6;color:#fff;border:none;font:inherit;font-size:13px;padding:7px 16px;border-radius:999px;cursor:pointer}
  .mbody{padding:8px 28px 44px}
  .mhead{text-align:center;padding-top:8px}
  .mtitle{font-family:var(--font-head);font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--roseTitle);font-size:40px;margin:0}
  .msans{font-family:var(--font-head);font-style:italic;color:var(--sage);font-size:22px;margin-top:4px}
  .mpron{font-family:var(--font-head);color:var(--taupe);font-size:17px;margin-top:2px}
  .malt{font-size:12px;color:var(--taupe);margin-top:10px}
  .facts{display:flex;justify-content:center;flex-wrap:wrap;margin:24px 0}
  .fact{padding:0 22px;text-align:center;border-left:1px solid var(--line)}
  .fact:first-child{border-left:none}
  .fact .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--taupe)}
  .fact .v{font-size:14px;color:var(--body);font-weight:500;margin-top:2px}
  .intro{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
  .intro p{font-size:15px;line-height:1.7;color:var(--body)}
  .fig{background:var(--chipBg);border:1px solid var(--line);border-radius:18px;min-height:230px;display:flex;align-items:center;justify-content:center;font-size:90px}
  .fig img{max-height:230px;max-width:100%;object-fit:contain}
  .rule{border-top:1px solid var(--line);margin:30px 0}
  .secgrid{display:grid;grid-template-columns:1fr 1fr;gap:30px 48px}
  .sec h3{font-family:var(--font-head);color:var(--rose);font-size:23px;margin:0 0 12px}
  .sec, .sec p, .sec li{font-size:14px;line-height:1.65;color:var(--body)}
  .sec.full{grid-column:1/-1}
  .sec p{margin:0 0 10px}
  ul.clean{list-style:none;padding:0;margin:0}
  ul.clean li{display:flex;gap:10px;margin-bottom:8px}
  ul.clean li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--rose);margin-top:8px;flex:0 0 auto}
  ol.steps{list-style:none;padding:0;margin:0;counter-reset:s}
  ol.steps li{display:flex;gap:12px;margin-bottom:10px;counter-increment:s}
  ol.steps li::before{content:counter(s);font-family:var(--font-head);color:var(--roseDeep);font-size:18px;width:18px;flex:0 0 auto}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tag{font-size:12px;padding:4px 11px;border-radius:999px;background:var(--chipBg);color:var(--chipFg)}
  .tag.sage{background:var(--sageBg);color:var(--sageFg)}
  .affirm{margin:36px auto 0;max-width:640px;background:var(--chipBg);border-radius:18px;text-align:center;padding:26px}
  .affirm .l{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--roseDeep)}
  .affirm .q{font-family:var(--font-head);font-style:italic;color:var(--roseDeep);font-size:24px;margin-top:8px}
  .vary{margin-top:44px;text-align:center}
  .vary h2{font-family:var(--font-head);text-transform:uppercase;letter-spacing:.18em;color:var(--roseTitle);font-size:28px;margin:0 0 16px}
  .vchips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:640px;margin:0 auto}
  .vchip{font-size:14px;padding:8px 16px;border-radius:12px;background:var(--chipBg);border:1px solid var(--line);color:var(--body)}
  @media (max-width:640px){.intro,.secgrid{grid-template-columns:1fr}.mtitle{font-size:30px}.flabel{width:100%}}

  /* ===== PPY site header ===== */
.ppy-header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-header [hidden]{display:none !important}
.ppy-bar{max-width:1200px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:16px}
.ppy-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex:0 0 auto}
.ppy-brand .mark{width:34px;height:34px;flex:0 0 auto}
.ppy-brand .wm{font-family:var(--ppy-fhead,'Playfair Display',Georgia,serif);font-weight:700;color:var(--ppy-accentDk,#A87C83);font-size:20px;line-height:1}
.ppy-brand img.lg{height:42px;width:auto;display:block}
.ppy-nav{display:flex;align-items:center;gap:2px;margin-left:6px}
.ppy-nav a{display:inline-flex;align-items:center;color:var(--ppy-ink,#6C7682);text-decoration:none;font-size:14px;font-weight:500;font-family:var(--ppy-fbody,'Poppins',system-ui,sans-serif);padding:8px 12px;border-radius:10px;white-space:nowrap}
.ppy-nav a:hover{background:var(--ppy-chip,#F6ECEF);color:var(--ppy-accentDk,#A87C83)}
.ppy-nav a.active{color:var(--ppy-accent,#C8A0A6);font-weight:600}
.ppy-nav a.locked{color:#A79FAC}
.ppy-nav a .lk{margin-left:5px;opacity:.7}
.ppy-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ppy-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ppy-accentDk,#A87C83);background:var(--ppy-chip,#F6ECEF);border-radius:999px;padding:4px 9px;font-weight:600;font-family:var(--ppy-fbody,'Poppins',sans-serif)}
.ppy-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:500;font-size:13.5px;font-family:var(--ppy-fbody,'Poppins',sans-serif);padding:8px 15px;border-radius:11px;white-space:nowrap;cursor:pointer;border:none}
.ppy-btn.primary{background:var(--ppy-accentDk,#A87C83);color:#fff}
.ppy-btn.ghost{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-lineDk,#E2D7D9)}
.ppy-btn.up{background:var(--ppy-accent,#C8A0A6);color:#fff}
.ppy-btn.admin{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-accent,#C8A0A6)}
.ppy-burger{display:none;background:none;border:1px solid var(--ppy-lineDk,#E2D7D9);border-radius:10px;width:42px;height:38px;cursor:pointer;align-items:center;justify-content:center;color:var(--ppy-ink,#6C7682)}
.ppy-burger svg{width:22px;height:22px}
.ppy-mobile{display:none;border-top:1px solid var(--ppy-line,#EFE6E8);background:#fff}
.ppy-mobile a{display:flex;align-items:center;padding:13px 22px;color:var(--ppy-ink,#6C7682);text-decoration:none;font-weight:500;font-family:var(--ppy-fbody,'Poppins',sans-serif);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-mobile a .lk{margin-left:auto;opacity:.6}
.ppy-mobile a.up{color:#fff;background:var(--ppy-accent,#C8A0A6)}
.ppy-mobile a.admin{color:var(--ppy-accentDk,#A87C83)}
@media (max-width:820px){.ppy-nav{display:none}.ppy-right{display:flex;order:3;margin-left:0}.ppy-right>*{display:none}.ppy-right>#ppyAuth{display:inline-flex}.ppy-brand{order:1}.ppy-burger{display:inline-flex;order:2;margin:0 auto}.ppy-mobile.open{display:block}}
/* ===== end header ===== */
.cuevars{margin-top:24px}
.cuevars h2{font-family:var(--font-head);color:var(--roseTitle);font-size:20px;margin:0 0 12px}
.cuetabs{display:flex;gap:6px;border-bottom:1px solid var(--line,#ece3e5);margin-bottom:14px;flex-wrap:wrap}
.cuetab{background:none;border:none;padding:9px 14px;color:var(--taupe);font-size:14px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.cuetab.on{color:var(--rose);border-bottom-color:var(--rose);font-weight:600}
.cuen{font-size:11px;opacity:.7}
.cuepane.hidden{display:none}
.vargal{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.fambase{display:inline-block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;background:var(--sage,#a8ad91);color:#fff;border-radius:6px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.varcard{background:var(--paper,#fff);border:2px solid var(--line,#ece3e5);border-radius:14px;padding:12px;text-align:center;cursor:pointer;font-family:inherit;width:100%;transition:border-color .15s,box-shadow .15s}
.varcard:hover{border-color:var(--rose)}
.varcard.on{border-color:var(--rose);box-shadow:0 0 0 3px rgba(200,160,166,.18)}
.varhint{font-size:13px;color:var(--taupe);margin:-6px 0 12px}
.varth{width:100%;aspect-ratio:1;background:var(--stage,#faf6f4);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:40px;margin-bottom:8px}
.varth img{width:100%;height:100%;object-fit:contain}
.varnm{font-family:var(--font-head);color:var(--roseTitle);font-size:15px;font-weight:600;line-height:1.2}
.varsn{font-size:12px;color:var(--sage);font-style:italic;margin-top:2px}
.varnote{font-size:12px;color:var(--taupe);margin-top:6px;line-height:1.4}
</style>
</head>

<script>
(function(){
  function paint(t){ var dark=t==="dark";

  function loadSb(cb){
    var existing=null;
    try{ if(typeof sb!=="undefined" && sb && sb.auth) existing=sb; }catch(e){}
    if(existing){ client=existing; return cb(); }
    function mk(){ try{ client=window.supabase.createClient(URL_,KEY_); cb(); }catch(e){} }
    if(window.supabase && window.supabase.createClient){ mk(); return; }
    var s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
    s.onload=mk; s.onerror=function(){}; document.head.appendChild(s);
  }
  function build(){
    var fab=document.createElement("button");
    fab.className="ppyh-fab"; fab.setAttribute("aria-label","Help & support"); fab.innerHTML="&#128172;";
    var panel=document.createElement("div"); panel.className="ppyh-panel";
    panel.innerHTML=
      '<div class="ppyh-head"><div style="flex:1"><h4>Help &amp; Support</h4><p>FAQs, ask a question, or send feedback</p></div><button class="ppyh-x" id="ppyhX">&#10005;</button></div>'+
      '<div class="ppyh-tabs"><button class="ppyh-tab on" data-t="faq">FAQs</button><button class="ppyh-tab" data-t="ask">Ask</button><button class="ppyh-tab" data-t="bug">Bug</button><button class="ppyh-tab" data-t="req">Request</button></div>'+
      '<div class="ppyh-body" id="ppyhBody"></div>'+
      '<div class="ppyh-foot" id="ppyhFoot" style="display:none"><textarea class="ppyh-ta" id="ppyhAsk" rows="1" placeholder="Ask about a pose, sequencing, or how the app works..."></textarea><button class="ppyh-send" id="ppyhSend">&#10148;</button></div>';
    document.body.appendChild(fab); document.body.appendChild(panel);
    window.__ppyhPanel=panel;
    fab.onclick=function(){ if(panel.classList.contains("open"))closePanel(); else openPanel("ask"); };
    panel.querySelector("#ppyhX").onclick=closePanel;
    panel.querySelectorAll(".ppyh-tab").forEach(function(t){ t.onclick=function(){ renderTab(t.dataset.t); }; });
    var ta=panel.querySelector("#ppyhAsk");
    ta.addEventListener("input",function(){ ta.style.height="auto"; ta.style.height=Math.min(90,ta.scrollHeight)+"px"; });
    ta.addEventListener("keydown",function(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendAsk(); } });
    panel.querySelector("#ppyhSend").onclick=sendAsk;
  }
  function openPanel(tab){ var p=window.__ppyhPanel; if(!p)return; p.classList.add("open"); renderTab(tab||"faq"); }
  function closePanel(){ var p=window.__ppyhPanel; if(p)p.classList.remove("open"); }
  function body(){ return document.getElementById("ppyhBody"); }
  function renderTab(t){
    var p=window.__ppyhPanel; if(!p)return;
    p.querySelectorAll(".ppyh-tab").forEach(function(x){ x.classList.toggle("on", x.dataset.t===t); });
    document.getElementById("ppyhFoot").style.display = (t==="ask"&&sessionUser) ? "flex" : "none";
    if(t==="faq") return renderFAQ();
    if(t==="ask") return renderAsk();
    if(t==="bug") return renderForm("bug");
    return renderForm("req");
  }
  function signInPrompt(action){
    return '<div class="ppyh-signin"><span class="e-ic" style="font-size:30px;display:block;margin-bottom:8px">&#128274;</span>Please sign in to '+action+'.<div style="margin-top:12px"><a class="ppyh-btn" style="display:inline-block;text-decoration:none" href="/">Sign in</a></div></div>';
  }
  /* ---- FAQs ---- */
  function renderFAQ(){
    var b=body();
    if(faqCache){ return paintFAQ(faqCache); }
    b.innerHTML='<div class="ppyh-empty">Loading FAQs\u2026</div>';
    client.from("faqs").select("category,question,answer,position").eq("is_published",true).order("category").order("position").then(function(r){
      if(r.error||!r.data){ b.innerHTML='<div class="ppyh-empty">Couldn\u2019t load FAQs right now.</div>'; return; }
      faqCache=r.data; paintFAQ(faqCache);
    });
  }
  function paintFAQ(rows){
    var b=body();
    if(!rows.length){ b.innerHTML='<div class="ppyh-empty"><span class="e-ic">&#128214;</span>No FAQs yet. Have a question? Try the <b>Ask</b> tab.</div>'; return; }
    var byCat={}; rows.forEach(function(f){ (byCat[f.category||"General"]=byCat[f.category||"General"]||[]).push(f); });
    var html='<div class="ppyh-faq">';
    Object.keys(byCat).forEach(function(c){
      html+='<div class="ppyh-faqcat">'+esc(c)+'</div>';
      byCat[c].forEach(function(f){ html+='<details class="ppyh-faqq"><summary>'+esc(f.question)+'</summary><div class="a">'+esc(f.answer)+'</div></details>'; });
    });
    html+='</div>'; b.innerHTML=html;
  }
  /* ---- Ask AI ---- */
  function renderAsk(){
    var b=body();
    if(!sessionUser){ b.innerHTML=signInPrompt("ask the assistant a question"); return; }
    if(!askHist.length){
      b.innerHTML='<div class="ppyh-empty"><span class="e-ic">&#127807;</span>Ask me about yoga &amp; poses or how to use Pure Passion Yoga.'+
        '<div class="ppyh-chips">'+
        '<span class="ppyh-chip" data-q="What\'s a good counter-pose after backbends?">Counter-pose after backbends?</span>'+
        '<span class="ppyh-chip" data-q="How do I use the AI flow generator?">Using the AI generator</span>'+
        '<span class="ppyh-chip" data-q="Modifications for wrist pain in Down Dog">Wrist pain in Down Dog</span>'+
        '</div></div>';
      b.querySelectorAll(".ppyh-chip").forEach(function(c){ c.onclick=function(){ document.getElementById("ppyhAsk").value=c.dataset.q; sendAsk(); }; });
      return;
    }
    var html='<div class="ppyh-msgs">';
    askHist.forEach(function(m){ html+='<div class="ppyh-msg '+(m.role==="user"?"user":(m.error?"err":"bot"))+'">'+esc(m.content)+'</div>'; });
    if(window.__ppyhBusy) html+='<div class="ppyh-msg bot"><span class="ppyh-spin">&#127807;</span> thinking...</div>';
    html+='</div>';
    b.innerHTML=html; b.scrollTop=b.scrollHeight;
  }
  function sendAsk(){
    if(!sessionUser)return;
    var inp=document.getElementById("ppyhAsk"); var q=(inp.value||"").trim();
    if(!q||window.__ppyhBusy)return;
    inp.value=""; inp.style.height="auto";
    askHist.push({role:"user",content:q}); window.__ppyhBusy=true; renderAsk();
    var hist=askHist.filter(function(m){return !m.error;}).slice(-6).map(function(m){return {role:m.role,content:m.content};});
    client.auth.getSession().then(function(r){
      var tok=r&&r.data&&r.data.session&&r.data.session.access_token;
      return fetch(FN_,{method:"POST",headers:{"Content-Type":"application/json","apikey":KEY_,"Authorization":"Bearer "+tok},body:JSON.stringify({question:q,history:hist})});
    }).then(function(res){ return res.json().then(function(j){ return {ok:res.ok,j:j}; }); })
    .then(function(o){
      window.__ppyhBusy=false;
      if(!o.ok||o.j.error){ askHist.push({role:"assistant",content:o.j.error||"Something went wrong. Please try again.",error:true}); }
      else { askHist.push({role:"assistant",content:o.j.answer||"(no answer)"}); }
      renderAsk();
    }).catch(function(){ window.__ppyhBusy=false; askHist.push({role:"assistant",content:"Network error. Please try again.",error:true}); renderAsk(); });
  }
  /* ---- Bug / Request ---- */
  function renderForm(mode){
    var b=body(); var isReq=mode==="req";
    if(!sessionUser){ b.innerHTML=signInPrompt(isReq?"send a request":"report a bug"); return; }
    b.innerHTML='<div class="ppyh-form">'+
      (isReq?'<label>What would you like?</label><div class="ppyh-seg" id="ppyhSeg"><button class="on" data-k="pose_request">A new pose</button><button data-k="feature_request">A feature</button></div>':'')+
      '<label>'+(isReq?'Title':'What went wrong?')+'</label>'+
      '<input class="ppyh-in" id="ppyhSubj" placeholder="'+(isReq?'e.g. Add Firefly Pose':'e.g. Save button does nothing')+'">'+
      '<label>Details</label>'+
      '<textarea class="ppyh-ta" id="ppyhBodyTxt" rows="5" placeholder="'+(isReq?'Tell us a bit more about what you\'d like and why...':'What happened, and what did you expect? Steps to reproduce help a lot.')+'"></textarea>'+
      '<div class="ppyh-note">'+(isReq?'Requests go straight to the studio team.':'Thanks for helping us squash bugs! We\'ll include the page you\'re on.')+'</div>'+
      '<button class="ppyh-btn" id="ppyhSubmit">'+(isReq?'Send request':'Send bug report')+'</button>'+
      '</div>';
    var kind=isReq?"pose_request":"bug";
    if(isReq){ b.querySelectorAll("#ppyhSeg button").forEach(function(btn){ btn.onclick=function(){ b.querySelectorAll("#ppyhSeg button").forEach(function(x){x.classList.remove("on");}); btn.classList.add("on"); kind=btn.dataset.k; }; }); }
    b.querySelector("#ppyhSubmit").onclick=function(){
      var subj=(b.querySelector("#ppyhSubj").value||"").trim();
      var body_=(b.querySelector("#ppyhBodyTxt").value||"").trim();
      if(!body_){ b.querySelector("#ppyhBodyTxt").focus(); return; }
      var btn=b.querySelector("#ppyhSubmit"); btn.disabled=true; btn.innerHTML='<span class="ppyh-spin">&#127807;</span> Sending...';
      var row={user_id:sessionUser.id,display_name:(profile&&profile.display_name)||null,email:(profile&&profile.email)||sessionUser.email||null,kind:kind,subject:subj||null,body:body_,page_url:location.href};
      client.from("feedback_items").insert(row).then(function(r){
        if(r.error){ btn.disabled=false; btn.textContent="Try again"; b.insertAdjacentHTML("afterbegin",'<div class="ppyh-msg err" style="margin-bottom:10px">'+esc(r.error.message)+'</div>'); return; }
        b.innerHTML='<div class="ppyh-ok"><span class="ok-ic">&#127881;</span><div style="font-family:\'Playfair Display\',Georgia,serif;font-size:17px;color:#A87C83;margin-bottom:4px">Thank you!</div><div style="font-size:13px;color:#6f5b61">'+(isReq?'Your request has been sent to the team.':'Your bug report has been sent. We appreciate it!')+'</div></div>';
      });
    };
  }
  function showFab(on){ if(hasLauncher)on=false; var f=document.querySelector(".ppyh-fab"); if(f)f.classList.toggle("show",!!on); if(!on&&window.__ppyhPanel&&!hasLauncher)window.__ppyhPanel.classList.remove("open"); }
  function refreshAuth(){
    client.auth.getSession().then(function(r){
      var sess=r&&r.data&&r.data.session;
      if(sess&&sess.user){ sessionUser=sess.user; showFab(true);
        client.from("profiles").select("display_name,email").eq("id",sess.user.id).maybeSingle().then(function(p){ if(p&&p.data)profile=p.data; });
      } else { sessionUser=null; showFab(false); }
    });
  }
  function wireLauncher(){
    var tries=0;
    (function attempt(){
      var lp=document.querySelector(".ppt-launch");
      if(lp){
        var help=null; lp.querySelectorAll("button").forEach(function(btn){ if(!btn.classList.contains("tour")) help=btn; });
        if(help){ hasLauncher=true; help.textContent="\u2753 Help"; help.onclick=function(e){ if(e&&e.preventDefault)e.preventDefault(); openPanel("faq"); }; showFab(false); return; }
      }
      if(tries++<8) setTimeout(attempt,250);
    })();
  }
  function init(){
    loadSb(function(){
      if(!client)return;
      build(); wireLauncher(); refreshAuth();
      try{ client.auth.onAuthStateChange(function(){ refreshAuth(); }); }catch(e){}
    });
  }
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init); else init();
})();
</script>
</body>
</html>
