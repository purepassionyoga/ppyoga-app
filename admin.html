<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Pure Passion Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#F5F1F4; --card:#fff; --ink:#2C2238; --head:#3A2E48; --aub:#4A3A5A;
    --clay:#C8A0A6; --clayDk:#A87C83; --jade:#2E7D6B; --amber:#B98A1F;
    --muted:#8A8090; --line:#ECE5EC; --lineDk:#DDD2DD; --field:#FBF9FB;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:14px}
  .serif{font-family:'Playfair Display',Georgia,serif}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hidden{display:none!important}
  .btn{background:var(--clayDk);color:#fff;border:none;padding:9px 18px;border-radius:10px;font-weight:500;font-size:14px}
  .btn:hover{background:#925266}
  .btn.ghost{background:#fff;color:var(--aub);border:1px solid var(--lineDk)}
  .btn.ghost:hover{border-color:var(--clay)}
  .btn:disabled{opacity:.5;cursor:default}

  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .lcard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:38px 34px;width:100%;max-width:380px;box-shadow:0 18px 50px rgba(74,58,90,.08)}
  .lcard h1{font-family:'Playfair Display',serif;color:var(--clayDk);font-size:26px;margin:0 0 4px;text-align:center}
  .lcard p{color:var(--muted);text-align:center;margin:0 0 24px;font-size:13px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--lineDk);border-radius:10px;background:var(--field);color:var(--ink);outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--clay)}
  .err{background:#FBE6DF;color:#A03A22;border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:12px}
  .ok{background:#E5F0EC;color:#1F6B58;border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:12px}

  /* app shell */
  .top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topin{max-width:1180px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px}
  .brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--clayDk);font-size:19px}
  .tag-admin{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  .who{margin-left:auto;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:12px}
  .tabs{max-width:1180px;margin:0 auto;padding:0 22px;display:flex;gap:6px}
  .tab{background:none;border:none;padding:12px 14px;color:var(--muted);font-size:14px;border-bottom:2px solid transparent}
  .tab.on{color:var(--clayDk);border-bottom-color:var(--clayDk);font-weight:500}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 22px 60px}

  /* dashboard */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}
  .stat .n{font-family:'Playfair Display',serif;font-size:30px;color:var(--head)}
  .stat .l{color:var(--muted);font-size:12px;margin-top:2px}
  h2.sec{font-family:'Playfair Display',serif;color:var(--head);font-weight:600;font-size:20px;margin:26px 0 12px}

  /* poses list */
  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:200px;padding:10px 12px;border:1px solid var(--lineDk);border-radius:10px;background:#fff;outline:none}
  .plist{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .prow{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .prow:last-child{border-bottom:none}
  .prow:hover{background:#FBF7FA}
  .pthumb{width:40px;height:40px;border-radius:9px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex:0 0 auto}
  .pthumb img{max-width:100%;max-height:100%;object-fit:contain}
  .pname{font-weight:500;color:var(--head)}
  .psan{color:var(--muted);font-size:12px}
  .pmeta{margin-left:auto;display:flex;align-items:center;gap:8px}
  .badge{font-size:11px;padding:2px 9px;border-radius:999px}
  .dot{font-size:10px;padding:2px 8px;border-radius:999px}
  .dot.pub{background:#E5F0EC;color:var(--jade)} .dot.dr{background:#F2ECF2;color:var(--muted)}

  /* editor */
  .ovl{position:fixed;inset:0;background:rgba(44,34,56,.4);z-index:50;display:flex;justify-content:center;overflow:auto;padding:18px}
  .ed{background:#fff;border-radius:22px;width:100%;max-width:780px;margin:14px 0;align-self:flex-start}
  .edtop{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:12px;border-radius:22px 22px 0 0;z-index:2}
  .edtop h2{font-family:'Playfair Display',serif;color:var(--head);margin:0;font-size:18px}
  .edbody{padding:18px 22px 30px}
  .grp{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
  .grp>.gt{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--clayDk);margin-bottom:12px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field textarea{min-height:64px;resize:vertical;line-height:1.5}
  .hint{font-size:11px;color:var(--muted);margin-top:3px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .chip{background:#F2ECF2;color:var(--aub);font-size:12px;padding:3px 8px;border-radius:999px;display:flex;align-items:center;gap:6px}
  .chip b{cursor:pointer;color:var(--clayDk);font-weight:700}
  .toggle{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);padding-top:8px}
  .imgrow{display:flex;gap:14px;align-items:center}
  .imgprev{width:84px;height:84px;border-radius:12px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}
  .imgprev img{max-width:100%;max-height:100%;object-fit:contain}
  @media (max-width:640px){.row2{grid-template-columns:1fr}}

  /* engagement */
  .erow-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px;flex-wrap:wrap}
  .note{color:var(--muted);font-size:12px}
  .tierbars{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin-top:14px}
  .tbar{display:flex;align-items:center;gap:12px;margin:9px 0}
  .tbar .nm{width:108px;font-size:13px;color:var(--ink);text-transform:capitalize}
  .tbar .track{flex:1;background:#F2ECF2;border-radius:999px;height:10px;overflow:hidden}
  .tbar .fill{height:100%;border-radius:999px;min-width:3px}
  .tbar .ct{width:34px;text-align:right;font-size:13px;color:var(--muted)}
  .ecols{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;margin-top:8px;align-items:start}
  @media (max-width:860px){.ecols{grid-template-columns:1fr}}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:16px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-family:'Playfair Display',serif;color:var(--head);font-size:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .panel .ph .cnt{font-family:'Poppins',sans-serif;font-size:12px;color:var(--muted)}
  .erow{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--line)}
  .erow:last-child{border-bottom:none}
  .erow .av{width:34px;height:34px;border-radius:9px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;color:var(--clayDk);font-weight:600}
  .erow .mn{font-weight:500;color:var(--head)}
  .erow .ms{color:var(--muted);font-size:12px}
  .erow .right{margin-left:auto;text-align:right;font-size:12px;color:var(--muted)}
  .tierpill{font-size:11px;padding:2px 9px;border-radius:999px;text-transform:capitalize;font-weight:500}
  .empty{padding:26px 16px;text-align:center;color:var(--muted);font-size:13px}
  .empty .em-ic{font-size:22px;display:block;margin-bottom:6px;opacity:.65}
  .esearch{padding:10px 14px;border-bottom:1px solid var(--line)}
  .esearch input{width:100%;padding:8px 11px;border:1px solid var(--lineDk);border-radius:9px;background:var(--field);outline:none}

  /* advanced */
  .okpill{display:inline-block;background:#E5F0EC;color:#1F6B58;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;margin-right:6px}
  .badpill{display:inline-block;background:#FBE6DF;color:#A03A22;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;margin-right:6px}
  .jsonbox{background:#FAF7FA;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--aub);overflow:auto;margin:0;white-space:pre-wrap;word-break:break-word}
  .abody{padding:16px}
  .exbtns{margin-left:auto;display:flex;gap:8px}
  .exbtns .btn{padding:6px 12px}

  /* legal */
  .lcat{font-family:'Playfair Display',serif;color:var(--head);font-size:16px;margin:22px 0 6px}
  .lrow{display:flex;align-items:center;gap:14px;padding:11px 14px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
  .lrow .mn{font-weight:500;color:var(--head)}
  .lrow .ms{color:var(--muted);font-size:12px}
  .lrow .lright{margin-left:auto;display:flex;align-items:center;gap:10px}
  .pill-on{font-size:11px;color:var(--jade);background:#E5F0EC;padding:2px 9px;border-radius:999px}
  .pill-off{font-size:11px;color:var(--muted);background:#F2ECF2;padding:2px 9px;border-radius:999px}
  .sw{position:relative;width:42px;height:24px;flex:0 0 auto;display:inline-block}
  .sw input{opacity:0;width:0;height:0}
  .sw .sl{position:absolute;inset:0;background:var(--lineDk);border-radius:999px;transition:.2s;cursor:pointer}
  .sw .sl::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + .sl{background:var(--jade)}
  .sw input:checked + .sl::before{transform:translateX(18px)}

  /* ===== PPY site header ===== */
.ppy-header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-header [hidden]{display:none !important}
.ppy-bar{max-width:1200px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:16px}
.ppy-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex:0 0 auto}
.ppy-brand .mark{width:34px;height:34px;flex:0 0 auto}
.ppy-brand .wm{font-family:var(--ppy-fhead,'Playfair Display',Georgia,serif);font-weight:700;color:var(--ppy-accentDk,#A87C83);font-size:20px;line-height:1}
.ppy-brand img.lg{height:42px;width:auto;display:block}
.ppy-nav{display:flex;align-items:center;gap:2px;margin-left:6px}
.ppy-nav a{display:inline-flex;align-items:center;color:var(--ppy-ink,#6C7682);text-decoration:none;font-size:14px;font-weight:500;font-family:var(--ppy-fbody,'Poppins',system-ui,sans-serif);padding:8px 12px;border-radius:10px;white-space:nowrap}
.ppy-nav a:hover{background:var(--ppy-chip,#F6ECEF);color:var(--ppy-accentDk,#A87C83)}
.ppy-nav a.active{color:var(--ppy-accent,#C8A0A6);font-weight:600}
.ppy-nav a.locked{color:#A79FAC}
.ppy-nav a .lk{margin-left:5px;opacity:.7}
.ppy-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ppy-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ppy-accentDk,#A87C83);background:var(--ppy-chip,#F6ECEF);border-radius:999px;padding:4px 9px;font-weight:600;font-family:var(--ppy-fbody,'Poppins',sans-serif)}
.ppy-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:500;font-size:13.5px;font-family:var(--ppy-fbody,'Poppins',sans-serif);padding:8px 15px;border-radius:11px;white-space:nowrap;cursor:pointer;border:none}
.ppy-btn.primary{background:var(--ppy-accentDk,#A87C83);color:#fff}
.ppy-btn.ghost{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-lineDk,#E2D7D9)}
.ppy-btn.up{background:var(--ppy-accent,#C8A0A6);color:#fff}
.ppy-btn.admin{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-accent,#C8A0A6)}
.ppy-burger{display:none;background:none;border:1px solid var(--ppy-lineDk,#E2D7D9);border-radius:10px;width:42px;height:38px;cursor:pointer;align-items:center;justify-content:center;color:var(--ppy-ink,#6C7682)}
.ppy-burger svg{width:22px;height:22px}
.ppy-mobile{display:none;border-top:1px solid var(--ppy-line,#EFE6E8);background:#fff}
.ppy-mobile a{display:flex;align-items:center;padding:13px 22px;color:var(--ppy-ink,#6C7682);text-decoration:none;font-weight:500;font-family:var(--ppy-fbody,'Poppins',sans-serif);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-mobile a .lk{margin-left:auto;opacity:.6}
.ppy-mobile a.up{color:#fff;background:var(--ppy-accent,#C8A0A6)}
.ppy-mobile a.admin{color:var(--ppy-accentDk,#A87C83)}
@media (max-width:820px){.ppy-nav{display:none}.ppy-right .hide-sm{display:none}.ppy-burger{display:inline-flex}.ppy-mobile.open{display:block}}
/* ===== end header ===== */
.ppy-header{position:static}
</style>
</head>
<body>
<style id="ppyLoaderCSS">
#ppyLoader{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#FBF7F6;opacity:1;transition:opacity .45s ease}
#ppyLoader.hide{opacity:0;pointer-events:none}
#ppyLoader .ppyl-mark{font-size:52px;line-height:1;animation:ppySpin 1s linear infinite;transform-origin:50% 50%}
#ppyLoader .ppyl-word{font-family:'Playfair Display',Georgia,serif;color:#A87C83;font-size:14px;letter-spacing:.06em;opacity:.75}
@keyframes ppySpin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){#ppyLoader .ppyl-mark{animation:none}}
</style>
<div id="ppyLoader" aria-hidden="true">
  <div class="ppyl-mark">🌸</div>
  <div class="ppyl-word">Pure Passion Yoga</div>
</div>
<script>
(function(){var el=document.getElementById('ppyLoader');if(!el)return;var done=false;function hide(){if(done)return;done=true;el.classList.add('hide');setTimeout(function(){if(el)el.style.display='none';},520);}window.ppyHideLoader=hide;if(document.readyState==='complete'){setTimeout(hide,180);}else{window.addEventListener('load',function(){setTimeout(hide,180);});}setTimeout(hide,6000);})();
</script>

      <span class="ppy-tier" id="ppyTier" hidden></span>

      <a class="ppy-btn primary" id="ppyAuth" href="/profile">Sign in</a>
      <a class="ppy-btn ghost" id="ppySignout" hidden href="#">Sign out</a>
    </div>
    <button class="ppy-burger" id="ppyBurger" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="ppy-mobile" id="ppyMobile">
    <a href="/library">Pose Library</a>
    <a href="/builder">Sequence Builder</a>
    <a data-nav="classes" hidden href="/classes">Classes</a>
    <a data-nav="challenges" hidden href="/challenges">Challenges</a>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <h1 class="serif">Pure Passion Yoga</h1>
    <p>Admin sign-in</p>
    <div id="loginErr" class="err hidden"></div>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" /></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" /></div>
    <button id="signin" class="btn" style="width:100%;margin-top:6px">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="top">
    <div class="topin" style="display:none">
      <span class="brand">Pure Passion Yoga</span>
      <span class="tag-admin">Admin</span>
      <span class="who"><span id="whoami"></span><button id="signout" class="btn ghost" style="padding:6px 12px">Sign out</button></span>
    </div>
    <div class="tabs">
      <button class="tab on" data-tab="dash">Dashboard</button>
      <button class="tab" data-tab="engage">Engagement</button>
      <button class="tab" data-tab="poses">Poses</button>
      <button class="tab" data-tab="design">Design</button>
      <button class="tab" data-tab="library">Library</button>
      <button class="tab" data-tab="builder">Builder</button>
      <button class="tab" data-tab="email">Email</button>
      <button class="tab" data-tab="advanced">Advanced</button>
      <button class="tab" data-tab="legal">Legal</button>
      <button class="tab" data-tab="site">Site</button>
      <button class="tab" data-tab="billing">Billing</button>
      <button class="tab" data-tab="shop">Shop</button>
    </div>
  </div>

  <div class="wrap">
    <div id="dash">
      <div id="stats" class="stats"></div>
    </div>
    <div id="engage" class="hidden"></div>
    <div id="poses" class="hidden">
      <div class="toolbar">
        <input id="search" placeholder="Search poses by name or Sanskrit…" />
        <button id="newPose" class="btn">+ New pose</button>
      </div>
      <div id="plist" class="plist"></div>
    </div>
    <div id="design" class="hidden"></div>
    <div id="library" class="hidden"></div>
    <div id="builder" class="hidden"></div>
    <div id="emailtab" class="hidden"></div>

let SHOP=null, SHOP_PRODUCTS=[];
async function loadShop(){
  const s=await sb.from("app_settings").select("value").eq("key","shop").single();

  SHOP_PRODUCTS=p.data||[];

}
function shMoney(c){ return (c==null||c==="")?"":((Number(c)||0)/100).toFixed(2); }
function prodCard(p){
  p=p||{}; const id=p.id||"";
  return `<div class="grp" data-pid="${id}">
    <div class="row2">
      <div class="field"><label>Title</label><input class="p_title" value="${esc(p.title||"")}"/></div>
      <div class="field"><label>Status</label><select class="p_status"><option value="draft" ${p.status!=="published"?"selected":""}>Draft</option><option value="published" ${p.status==="published"?"selected":""}>Published</option></select></div>
    </div>
    <div class="field"><label>Description</label><textarea class="p_desc" rows="2">${esc(p.description||"")}</textarea></div>
    <div class="row2">
      <div class="field"><label>Image URL</label><input class="p_img" placeholder="https://…" value="${esc(p.image_url||"")}"/></div>
      <div class="field"><label>Link URL (affiliate / external)</label><input class="p_url" placeholder="https://…" value="${esc(p.url||"")}"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Price ($)</label><input class="p_price" value="${shMoney(p.price_cents)}"/></div>
      <div class="field"><label>Was / regular price ($, optional)</label><input class="p_reg" value="${shMoney(p.regular_cents)}"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Categories (comma-separated)</label><input class="p_cats" placeholder="Props, Books" value="${esc((p.categories||[]).join(", "))}"/></div>
      <div class="field"><label>Rating (0\u20135, optional)</label><input class="p_rating" value="${p.rating!=null?p.rating:""}"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Type</label><select class="p_type"><option value="affiliate" ${p.product_type!=="native"?"selected":""}>Affiliate / external link</option><option value="native" ${p.product_type==="native"?"selected":""}>Sold here (Stripe)</option></select></div>
      <div class="field"><label>Stripe price ID (native only)</label><input class="p_pid" placeholder="price_\u2026" value="${esc(p.stripe_price_id||"")}"/></div>
    </div>
    <div class="row2">
      <div class="field"><label>Sort order</label><input class="p_sort" value="${p.sort_order!=null?p.sort_order:0}"/></div>
      <div class="field"><label class="toggle" style="margin-top:26px"><input type="checkbox" class="p_feat" ${p.featured?"checked":""}/> Featured</label></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
      <button class="btn p_save">Save</button>
      <button class="btn ghost p_del">Delete</button>
      <span class="p_msg" style="color:var(--muted);font-size:13px"></span>
    </div>
  </div>`;
}
function renderShop(){
  const s=SHOP;
  $("shop").innerHTML=`<div id="shopErr" class="err hidden"></div>
    <div class="grp"><div class="gt">Shop \u2014 settings</div>
      <label class="toggle"><input type="checkbox" id="s_enabled" ${s.enabled?"checked":""}/> Shop enabled (show the Shop link in the site header)</label>
      <div class="row2" style="margin-top:10px">
        <div class="field"><label>Heading</label><input id="s_heading" value="${esc(s.heading||"Shop")}"/></div>
        <div class="field"><label>Subheading</label><input id="s_subheading" value="${esc(s.subheading||"")}"/></div>
      </div>
      <button class="btn" id="shop_save">Save shop settings</button>
      <span id="shop_status" style="margin-left:12px;color:var(--muted);font-size:13px"></span>
      <div class="hint">Affiliate products open an external link. \u201cSold here (Stripe)\u201d is ready in the schema for when you sell natively \u2014 paste a Stripe one-time price ID and we\u2019ll wire its checkout.</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px">
      <div class="gt" style="margin:0">Products (${SHOP_PRODUCTS.length})</div>
      <button class="btn" id="s_add">+ Add product</button>
    </div>
    <div id="prodList">${SHOP_PRODUCTS.map(prodCard).join("")||'<div style="color:var(--muted)">No products yet \u2014 click \u201c+ Add product\u201d.</div>'}</div>`;
  $("shop_save").onclick=saveShopSettings;
  $("s_add").onclick=addProduct;
  bindProdCards();
}
function bindProdCards(){
  document.querySelectorAll('#shop [data-pid]').forEach(card=>{
    card.querySelector(".p_save").onclick=()=>saveProduct(card);
    const d=card.querySelector(".p_del"); if(d) d.onclick=()=>deleteProduct(card);
  });
}
async function saveShopSettings(){
  const out={enabled:$("s_enabled").checked, heading:$("s_heading").value.trim()||"Shop", subheading:$("s_subheading").value.trim()};
  $("shop_save").disabled=true;
  const{error}=await sb.from("app_settings").upsert({key:"shop",value:out});
  $("shop_save").disabled=false;
  if(error){$("shopErr").textContent=error.message;$("shopErr").classList.remove("hidden");return;}
  SHOP=out;$("shop_status").textContent="Saved \u2713";
}
function addProduct(){
  const list=$("prodList"); const wrap=document.createElement("div");
  wrap.innerHTML=prodCard({status:"draft",product_type:"affiliate",sort_order:SHOP_PRODUCTS.length+1,categories:[]});
  const card=wrap.firstElementChild; list.insertBefore(card,list.firstChild);
  card.querySelector(".p_save").onclick=()=>saveProduct(card);
  card.querySelector(".p_del").onclick=()=>card.remove();
}
function shSlug(t){ return (t||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,50); }
async function saveProduct(card){
  const g=s=>card.querySelector(s);
  const cents=v=>{v=(v||"").toString().trim(); return v===""?null:Math.round(parseFloat(v)*100);};
  const rv=g(".p_rating").value.trim();
  const rec={
    title:g(".p_title").value.trim(), description:g(".p_desc").value.trim(),
    image_url:g(".p_img").value.trim(), url:g(".p_url").value.trim(),
    price_cents:cents(g(".p_price").value), regular_cents:cents(g(".p_reg").value),
    categories:g(".p_cats").value.split(",").map(x=>x.trim()).filter(Boolean),
    rating:rv===""?null:parseFloat(rv),
    product_type:g(".p_type").value, stripe_price_id:g(".p_pid").value.trim(),
    status:g(".p_status").value, sort_order:parseInt(g(".p_sort").value)||0,
    featured:g(".p_feat").checked, updated_at:new Date().toISOString()
  };
  const msg=g(".p_msg");
  if(!rec.title){ msg.textContent="Title required"; return; }
  msg.textContent="Saving\u2026";
  const id=card.getAttribute("data-pid"); let res;
  if(id){ res=await sb.from("products").update(rec).eq("id",id); }
  else { rec.slug=shSlug(rec.title)+"-"+Math.random().toString(36).slice(2,6); res=await sb.from("products").insert(rec).select("id").single(); }
  if(res.error){ msg.textContent=res.error.message; return; }
  if(!id && res.data && res.data.id){ card.setAttribute("data-pid",res.data.id); SHOP_PRODUCTS.push({id:res.data.id}); }
  msg.textContent="Saved \u2713";
}
async function deleteProduct(card){
  const id=card.getAttribute("data-pid");
  if(!id){ card.remove(); return; }
  if(!confirm("Delete this product? This cannot be undone.")) return;
  const{error}=await sb.from("products").delete().eq("id",id);
  if(error){ card.querySelector(".p_msg").textContent=error.message; return; }
  card.remove();
}

async function saveBilling(){

      name:g(".b_name").value.trim(), blurb:g(".b_blurb").value.trim(), active:g(".b_active").checked,

let ADV=null, advLoaded=false;
const cap=s=>s?s[0].toUpperCase()+s.slice(1):s;

function downloadFile(name, text, type){
  const blob=new Blob([text],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function toCSV(rows){
  if(!rows||!rows.length) return "";
  const cols=[...rows.reduce((s,r)=>{Object.keys(r).forEach(k=>s.add(k));return s;},new Set())];
  const cell=v=>{ if(v==null) return ""; if(typeof v==="object") v=JSON.stringify(v); v=String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  return cols.join(",")+"\n"+rows.map(r=>cols.map(c=>cell(r[c])).join(",")).join("\n");
}
async function exportData(kind, fmt, btn){
  const old=btn.textContent; btn.disabled=true; btn.textContent="…";
  const { data, error } = await sb.rpc("admin_export",{ kind });
  btn.disabled=false; btn.textContent=old;
  if(error){ alert("Export failed: "+error.message); return; }
  const rows=data||[], stamp=new Date().toISOString().slice(0,10);
  if(fmt==="json") downloadFile(`ppyoga-${kind}-${stamp}.json`, JSON.stringify(rows,null,2), "application/json");
  else downloadFile(`ppyoga-${kind}-${stamp}.csv`, toCSV(rows), "text/csv");
}

        ${area("Alignment / instructions","instructions",listVal("instructions"),"One step per line")}
        ${area("Benefits","benefits",lv("benefits"))}
        ${area("Teaching cues","teaching_cues",listVal("teaching_cues"),"One per line")}
        ${area("Breath cues","breath_cues",listVal("breath_cues"),"One per line")}
        ${area("Contraindications","contraindications",lv("contraindications"),"One per line")}
        ${area("Modifications","modifications",listVal("modifications"),"One per line")}
        ${area("Advanced variations","advanced_variations",listVal("advanced_variations"),"One per line")}
        ${tagField("Focus & benefit tags","benefit_tags")}
        ${tagField("Contraindication tags","contraindication_tags")}
        ${field("Affirmation","affirmation",lv("affirmation"))}
      </div>

      <div class="grp"><div class="gt">Illustration</div>
        <div class="imgrow">
          <div class="imgprev" id="imgPrev">${p.image_url?`<img src="${esc(p.image_url)}">`:"🧘"}</div>
          <div style="flex:1">
            ${field("Image URL","image_url",lv("image_url"),{hint:"Paste a URL, or upload a file below"})}
            <input type="file" id="imgFile" accept="image/*" />
            <div class="hint" id="upStatus"></div>
          </div>
        </div>
      </div>

      <div class="grp"><div class="gt">Publishing</div>
        <div class="row2">
          <label class="toggle"><input type="checkbox" id="f_published" ${p.status!=="draft"?"checked":""}/> Published to website</label>
          <label class="toggle"><input type="checkbox" id="f_is_free" ${p.is_free?"checked":""}/> Free (non-members)</label>
        </div>
        <div class="row2">${field("SEO title","seo_title",lv("seo_title"))}${field("SEO description","seo_description",lv("seo_description"))}</div>
        ${tagField("Keywords","keywords")}
      </div>
    </div></div></div>`;
  $("ovl").onclick=closeEd;
  document.body.style.overflow="hidden";
  TAG_FIELDS.forEach(setupTag);
  $("imgFile").onchange=onUpload;
  $("saveBtn").onclick=save;
}
function closeEd(){ $("edRoot").innerHTML=""; document.body.style.overflow=""; }
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&$("edRoot").innerHTML)closeEd();});

function renderChips(key){
  $("chips_"+key).innerHTML=tagState[key].map((v,i)=>`<span class="chip">${esc(v)}<b data-k="${key}" data-i="${i}">✕</b></span>`).join("");
  $("chips_"+key).querySelectorAll("b").forEach(b=>b.onclick=()=>{tagState[key].splice(+b.dataset.i,1);renderChips(key);});
}
function setupTag(key){
  renderChips(key);
  const inp=$("tag_"+key);
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===","){e.preventDefault();const v=inp.value.trim().replace(/,$/,"");if(v&&!tagState[key].includes(v)){tagState[key].push(v);renderChips(key);}inp.value="";}
  });
  inp.addEventListener("change",()=>{const v=inp.value.trim();if(v&&!tagState[key].includes(v)){tagState[key].push(v);renderChips(key);}inp.value="";});
}

async function onUpload(e){
  const file=e.target.files[0]; if(!file) return;
  $("upStatus").textContent="Uploading…";
  const ext=(file.name.split(".").pop()||"png").toLowerCase();
  const path=(($("f_slug").value||"pose").toLowerCase().replace(/[^a-z0-9]+/g,"-"))+"-"+Date.now().toString(36)+"."+ext;
  const { error } = await sb.storage.from("pose-images").upload(path, file, { upsert:true, contentType:file.type });
  if(error){ $("upStatus").textContent="Upload failed: "+error.message; return; }
  const { data } = sb.storage.from("pose-images").getPublicUrl(path);
  $("f_image_url").value=data.publicUrl;
  $("imgPrev").innerHTML=`<img src="${esc(data.publicUrl)}">`;
  $("upStatus").textContent="Uploaded ✓";
}

function val(id){const el=$("f_"+id);return el?el.value.trim():"";}
function listToArr(id){return val(id).split(/\n+/).map(s=>s.trim()).filter(Boolean);}
async function save(){
  $("edErr").classList.add("hidden");
  const diff=val("difficulty_level");
  const payload={
    name:val("name"), sanskrit_name:val("sanskrit_name")||null, pronunciation:val("pronunciation")||null,
    slug:val("slug")||null, canonical_pose_id:val("canonical_pose_id")||null, emoji:val("emoji")||null,
    category:val("category")||null, difficulty_level:diff||null,
    level:["Beginner","Intermediate","Advanced"].includes(diff)?diff:null,
    primary_movement:val("primary_movement")||null,
    short_description:val("short_description")||null, anatomy_breakdown:val("anatomy_breakdown")||null,
    benefits:val("benefits")||null, contraindications:val("contraindications")||null,
    affirmation:val("affirmation")||null, seo_title:val("seo_title")||null, seo_description:val("seo_description")||null,
    image_url:val("image_url")||null,
    is_free:$("f_is_free").checked, published_to_website:$("f_published").checked,
    status:$("f_published").checked?"published":"draft",
  };
  TAG_FIELDS.forEach(f=>payload[f]=tagState[f]);
  LIST_FIELDS.forEach(f=>payload[f]=listToArr(f));
  if(!payload.name){ return showEdErr("Name is required."); }
  if(!payload.slug){ payload.slug=payload.name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
  $("saveBtn").disabled=true; $("saveBtn").textContent="Saving…";
  let res;
  if(editing) res=await sb.from("poses").update(payload).eq("id",editing).select("id").single();
  else res=await sb.from("poses").insert(payload).select("id").single();
  $("saveBtn").disabled=false; $("saveBtn").textContent="Save";
  if(res.error){ return showEdErr(res.error.message); }
  closeEd(); await loadPoses();
}
function showEdErr(m){ const e=$("edErr"); e.textContent=m; e.classList.remove("hidden"); e.scrollIntoView({behavior:"smooth",block:"center"}); }

sb.auth.onAuthStateChange((_e,session)=>{ if(!session) showLogin(); });
init();
</script>
