<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Legal Center · Pure Passion Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="gf-head" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap">
<link id="gf-body" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  :root{ --bg:#F3F3F3; --card:#fff; --ink:#5C5664; --head:#3A2E48; --clay:#C8A0A6; --clayDk:#A87C83; --sage:#a8ad91; --line:#ECE7EC;
    --fontHead:'Playfair Display',Georgia,serif; --fontBody:'Poppins',system-ui,sans-serif; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--fontBody);line-height:1.65;font-size:15px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto;padding:46px 22px 80px}
  a{color:var(--clayDk);text-decoration:none}
  a:hover{text-decoration:underline}
  .brand{font-family:var(--fontHead);color:var(--clayDk);font-weight:700;font-size:18px}
  .accent{height:4px;width:54px;background:linear-gradient(90deg,var(--clay),var(--sage));border-radius:999px;margin:18px 0 4px}
  .badge{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--clayDk);font-weight:600}
  h1{font-family:var(--fontHead);color:var(--head);font-size:34px;margin:6px 0 8px;font-weight:700}
  .lede{font-size:16px;margin:0 0 8px}
  .back{display:inline-block;margin-bottom:14px;font-size:13px}
  .cat{margin-top:30px}
  .cat h2{font-family:var(--fontHead);color:var(--head);font-size:19px;margin:0 0 4px;font-weight:600}
  .catline{height:1px;background:var(--line);margin:8px 0 4px}
  .doclink{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .doclink:last-child{border-bottom:none}
  .doclink .dot{width:7px;height:7px;border-radius:50%;background:var(--sage);flex:0 0 auto}
  .doclink a{color:var(--head);font-weight:500}
  .doclink .arr{margin-left:auto;color:var(--clay)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 32px;margin-top:18px;box-shadow:0 10px 30px rgba(74,58,90,.05)}
  .card h2{font-family:var(--fontHead);color:var(--head);font-size:20px;margin:26px 0 8px;font-weight:600}
  .card h3{color:var(--clayDk);font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin:16px 0 4px;font-weight:600}
  .card p{margin:8px 0}
  .card ul{padding-left:20px;margin:6px 0}
  .card li{margin:4px 0}
  .card .contact{background:#FBF7FA;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:8px}
  .card .mail{display:inline-block;background:var(--clayDk);color:#fff;text-decoration:none;padding:11px 20px;border-radius:11px;font-weight:500}
  .meta{color:#9A95A0;font-size:13px;margin:2px 0 0}
  .note{font-size:13px;color:#9A95A0;border-top:1px solid var(--line);margin-top:30px;padding-top:16px}
  .empty{padding:40px 10px;text-align:center;color:#9A95A0}
  .spin{padding:50px;text-align:center;color:#9A95A0}

  /* ===== PPY site header ===== */
.ppy-header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-bar{max-width:1200px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:16px}
.ppy-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex:0 0 auto}
.ppy-brand .mark{width:34px;height:34px;flex:0 0 auto}
.ppy-brand .wm{font-family:var(--ppy-fhead,'Playfair Display',Georgia,serif);font-weight:700;color:var(--ppy-accentDk,#A87C83);font-size:20px;line-height:1}
.ppy-brand img.lg{height:42px;width:auto;display:block}
.ppy-nav{display:flex;align-items:center;gap:2px;margin-left:6px}
.ppy-nav a{display:inline-flex;align-items:center;color:var(--ppy-ink,#6C7682);text-decoration:none;font-size:14px;font-weight:500;font-family:var(--ppy-fbody,'Poppins',system-ui,sans-serif);padding:8px 12px;border-radius:10px;white-space:nowrap}
.ppy-nav a:hover{background:var(--ppy-chip,#F6ECEF);color:var(--ppy-accentDk,#A87C83)}
.ppy-nav a.active{color:var(--ppy-accent,#C8A0A6);font-weight:600}
.ppy-nav a.locked{color:#A79FAC}
.ppy-nav a .lk{margin-left:5px;opacity:.7}
.ppy-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ppy-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ppy-accentDk,#A87C83);background:var(--ppy-chip,#F6ECEF);border-radius:999px;padding:4px 9px;font-weight:600;font-family:var(--ppy-fbody,'Poppins',sans-serif)}
.ppy-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:500;font-size:13.5px;font-family:var(--ppy-fbody,'Poppins',sans-serif);padding:8px 15px;border-radius:11px;white-space:nowrap;cursor:pointer;border:none}
.ppy-btn.primary{background:var(--ppy-accentDk,#A87C83);color:#fff}
.ppy-btn.ghost{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-lineDk,#E2D7D9)}
.ppy-btn.up{background:var(--ppy-accent,#C8A0A6);color:#fff}
.ppy-btn.admin{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-accent,#C8A0A6)}
.ppy-burger{display:none;background:none;border:1px solid var(--ppy-lineDk,#E2D7D9);border-radius:10px;width:42px;height:38px;cursor:pointer;align-items:center;justify-content:center;color:var(--ppy-ink,#6C7682)}
.ppy-burger svg{width:22px;height:22px}
.ppy-mobile{display:none;border-top:1px solid var(--ppy-line,#EFE6E8);background:#fff}
.ppy-mobile a{display:flex;align-items:center;padding:13px 22px;color:var(--ppy-ink,#6C7682);text-decoration:none;font-weight:500;font-family:var(--ppy-fbody,'Poppins',sans-serif);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-mobile a .lk{margin-left:auto;opacity:.6}
.ppy-mobile a.up{color:#fff;background:var(--ppy-accent,#C8A0A6)}
.ppy-mobile a.admin{color:var(--ppy-accentDk,#A87C83)}
@media (max-width:820px){.ppy-nav{display:none}.ppy-right .hide-sm{display:none}.ppy-burger{display:inline-flex}.ppy-mobile.open{display:block}}
/* ===== end header ===== */
</style>
</head>
<body>
<header class="ppy-header" id="ppyHeader">
  <div class="ppy-bar">
    <a class="ppy-brand" id="ppyBrand" href="https://ppyoga-app.vercel.app">
      <svg class="mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 7c2.6 3.2 4 6.7 4 10.2 0 3.8-1.6 7.2-4 9.8-2.4-2.6-4-6-4-9.8C20 13.7 21.4 10.2 24 7Z" fill="#C8A0A6"/>
        <path d="M13 14c3.7 1 6.6 2.9 8.6 5.3 2.2 2.6 3.2 5.8 3.1 9-3.4-.6-6.6-2.2-8.8-4.8-2-2.4-3-5.6-2.9-9.5Z" fill="#a8ad91"/>
        <path d="M35 14c-3.7 1-6.6 2.9-8.6 5.3-2.2 2.6-3.2 5.8-3.1 9 3.4-.6 6.6-2.2 8.8-4.8 2-2.4 3-5.6 2.9-9.5Z" fill="#a8ad91"/>
        <path d="M8 22c3.6-.2 6.8.6 9.4 2.3 2.7 1.8 4.5 4.4 5.4 7.4-3.4.5-6.8-.1-9.6-1.9C10.7 28.2 9 25.4 8 22Z" fill="#A87C83"/>
        <path d="M40 22c-3.6-.2-6.8.6-9.4 2.3-2.7 1.8-4.5 4.4-5.4 7.4 3.4.5 6.8-.1 9.6-1.9 2.5-1.6 4.2-4.4 5.2-7.8Z" fill="#A87C83"/>
        <path d="M12 31c4 0 12 1.6 12 8 0-6.4 8-8 12-8-1.5 5-6.5 9-12 9s-10.5-4-12-9Z" fill="#C8A0A6"/>
      </svg>
      <span class="wm brand">Pure Passion Yoga</span>
    </a>
    <nav class="ppy-nav" id="ppyNav">
      <a href="https://ppyoga-app.vercel.app">Pose Library</a>
      <a href="https://ppyoga-builder.vercel.app">Sequence Builder</a>
      <a data-nav="classes" hidden href="https://ppyoga-app.vercel.app/classes">Classes</a>
      <a data-nav="challenges" hidden href="https://ppyoga-app.vercel.app/challenges">Challenges</a>
      <a href="https://purepassionyoga.com/shop">Shop</a>
      <a href="https://purepassionyoga.com/about">About</a>
    </nav>
    <div class="ppy-right" id="ppyRight">
      <span class="ppy-tier" id="ppyTier" hidden></span>
      <a class="ppy-btn admin" id="ppyAdmin" hidden href="https://ppyoga-admin.vercel.app">Admin</a>
      <a class="ppy-btn primary" id="ppyAuth" href="https://ppyoga-profile.vercel.app">Sign in</a>
    </div>
    <button class="ppy-burger" id="ppyBurger" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="ppy-mobile" id="ppyMobile">
    <a href="https://ppyoga-app.vercel.app">Pose Library</a>
    <a href="https://ppyoga-builder.vercel.app">Sequence Builder</a>
    <a data-nav="classes" hidden href="https://ppyoga-app.vercel.app/classes">Classes</a>
    <a data-nav="challenges" hidden href="https://ppyoga-app.vercel.app/challenges">Challenges</a>
    <a href="https://purepassionyoga.com/shop">Shop</a>
    <a href="https://purepassionyoga.com/about">About</a>
    <a class="admin" id="ppyAdminM" hidden href="https://ppyoga-admin.vercel.app">Admin</a>
    <a class="up" id="ppyAuthM" href="https://ppyoga-profile.vercel.app">Sign in</a>
  </div>
</header>
  <div class="wrap" id="root"><div class="spin">Loading…</div></div>

<script>
const SUPABASE_URL="https://nxjbpgnpblqepathojzr.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54amJwZ25wYmxxZXBhdGhvanpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTE3MTYsImV4cCI6MjA5MDA2NzcxNn0.0thRMnySyacG_fcFiHlteEk4scwfWrP6HmjSlBdg3Ik";
const sb = supabase.createClient(SUPABASE_URL, ANON);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const CAT_ORDER=["Core Legal","Privacy & Data","Commerce & Orders","Disclosures","Community & Content","Safety & Wellness","Accessibility","Company & Values"];
let APP_NAME="Pure Passion Yoga", SITE_URL="https://purepassionyoga.com";

function loadFont(id,name){ if(!name) return; const l=$(id); if(l) l.href="https://fonts.googleapis.com/css2?family="+encodeURIComponent(name)+":wght@400;500;600;700&display=swap"; }
async function applyDesign(){
  try{
    const { data } = await sb.from("app_settings").select("value").eq("key","design").single();
    const d=(data&&data.value)||{}, r=document.documentElement.style;
    if(d.color_page_bg) r.setProperty("--bg",d.color_page_bg);
    if(d.color_surface) r.setProperty("--card",d.color_surface);
    if(d.color_body_text) r.setProperty("--ink",d.color_body_text);
    if(d.color_primary){ r.setProperty("--clay",d.color_primary); r.setProperty("--clayDk",d.color_primary); }
    if(d.color_secondary) r.setProperty("--sage",d.color_secondary);
    if(d.font_heading){ r.setProperty("--fontHead","'"+d.font_heading+"',Georgia,serif"); loadFont("gf-head",d.font_heading); }
    if(d.font_body){ r.setProperty("--fontBody","'"+d.font_body+"',system-ui,sans-serif"); loadFont("gf-body",d.font_body); }
    if(d.app_name) APP_NAME=d.app_name;
    if(d.website_url) SITE_URL=d.website_url;
  }catch(e){}
}

function header(){ return `<span class="brand">${esc(APP_NAME)}</span><div class="accent"></div>`; }

async function renderIndex(){
  const { data, error } = await sb.from("legal_pages")
    .select("slug,title,category,sort_order").order("sort_order");
  if(error){ $("root").innerHTML=header()+`<div class="empty">Couldn’t load right now. Please try again later.</div>`; return; }
  const rows=data||[];
  if(!rows.length){ $("root").innerHTML=header()+`<p class="badge">Legal</p><h1>Legal Center</h1><div class="empty">No policies are published yet.</div>`; return; }
  const cats={}; rows.forEach(r=>{ (cats[r.category]=cats[r.category]||[]).push(r); });
  const order=[...CAT_ORDER.filter(c=>cats[c]), ...Object.keys(cats).filter(c=>!CAT_ORDER.includes(c))];
  let html=header()+`<p class="badge">Legal</p><h1>Legal Center</h1>
    <p class="lede">Our policies, terms, and disclosures — all in one place. Tap any item to read it.</p>`;
  order.forEach(cat=>{
    html+=`<div class="cat"><h2>${esc(cat)}</h2><div class="catline"></div>`;
    cats[cat].forEach(r=>{
      html+=`<div class="doclink"><span class="dot"></span><a href="?doc=${encodeURIComponent(r.slug)}">${esc(r.title)}</a><span class="arr">›</span></div>`;
    });
    html+=`</div>`;
  });
  html+=`<p class="note">Questions? Email <a href="mailto:support@purepassionyoga.com">support@purepassionyoga.com</a> · <a href="${esc(SITE_URL)}" target="_blank" rel="noopener">${esc(SITE_URL.replace(/^https?:\/\//,""))}</a></p>`;
  $("root").innerHTML=html;
}

async function renderDoc(slug){
  const { data, error } = await sb.from("legal_pages")
    .select("title,category,body,updated_at").eq("slug",slug).maybeSingle();
  if(error || !data){
    $("root").innerHTML=header()+`<a class="back" href="?">‹ Legal Center</a><div class="empty">This page isn’t available.</div>`; return;
  }
  if(!data.body){
    $("root").innerHTML=header()+`<a class="back" href="?">‹ Legal Center</a><p class="badge">${esc(data.category||"Legal")}</p><h1>${esc(data.title)}</h1><div class="empty">This policy is coming soon.</div>`; return;
  }
  const upd=data.updated_at?new Date(data.updated_at).toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"}):"";
  $("root").innerHTML=header()+
    `<a class="back" href="?">‹ Legal Center</a>
     <p class="badge">${esc(data.category||"Legal")}</p>
     <h1>${esc(data.title)}</h1>
     ${upd?`<p class="meta">Last updated ${esc(upd)}</p>`:""}
     <div class="card">${data.body}</div>
     <p class="note">See all policies in our <a href="?">Legal Center</a>. Questions? Email <a href="mailto:support@purepassionyoga.com">support@purepassionyoga.com</a>.</p>`;
  document.title=data.title+" · "+APP_NAME;
}

(async function(){
  await applyDesign();
  const slug=new URLSearchParams(location.search).get("doc");
  if(slug) renderDoc(slug); else renderIndex();
})();
window.addEventListener("popstate",()=>location.reload());
</script>

<script>
/* ===== PPY adaptive header controller =====
   Self-contained. No external deps. Safe on any PPY page.
   Today (cross-origin): no same-origin session -> renders the logged-out shell.
   Once pages share one domain: auto-upgrades to tier/admin-aware with zero re-bake.
*/
(function(){
  var SB="https://nxjbpgnpblqepathojzr.supabase.co", KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54amJwZ25wYmxxZXBhdGhvanpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTE3MTYsImV4cCI6MjA5MDA2NzcxNn0.0thRMnySyacG_fcFiHlteEk4scwfWrP6HmjSlBdg3Ik";
  var $=function(id){return document.getElementById(id);};

  // 1) Burger -> mobile menu
  var burger=$("ppyBurger"), mob=$("ppyMobile");
  if(burger&&mob) burger.addEventListener("click",function(){mob.classList.toggle("open");});

  // 2) Active link by current location
  try{
    var norm=function(h,p){return h+(p||"/").replace(/\/index\.html$/,"/").replace(/\/+$/,"/");};
    var here=norm(location.host, location.pathname);
    document.querySelectorAll("#ppyNav a").forEach(function(a){
      try{var u=new URL(a.href); if(norm(u.host,u.pathname)===here) a.classList.add("active");}catch(e){}
    });
  }catch(e){}

  // 3) design + site config (one request): brand text, logo, Classes/Challenges reveal
  fetch(SB+"/rest/v1/app_settings?select=key,value&key=in.(design,site)",
        {headers:{apikey:KEY,Authorization:"Bearer "+KEY}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(rows){
      var map={}; (rows||[]).forEach(function(x){map[x.key]=x.value||{};});
      var d=map.design||{}, site=map.site||{};
      if(d.app_name){ document.querySelectorAll(".ppy-brand .wm").forEach(function(e){e.textContent=d.app_name;}); }
      if(d.logo_url){
        document.querySelectorAll(".ppy-brand").forEach(function(b){
          var mark=b.querySelector(".mark");
          var img=document.createElement("img"); img.className="lg"; img.src=d.logo_url; img.alt=(d.app_name||"Pure Passion Yoga");
          if(mark) b.replaceChild(img,mark);
          var wm=b.querySelector(".wm"); if(wm) wm.style.display="none";
        });
      }
      if(site.classes_enabled)    document.querySelectorAll("[data-nav='classes']").forEach(function(e){e.hidden=false;});
      if(site.challenges_enabled) document.querySelectorAll("[data-nav='challenges']").forEach(function(e){e.hidden=false;});
    }).catch(function(){});

  // 4) Auth state from same-origin Supabase session (no SDK needed).
  //    Cross-origin there is no token here, so this is a graceful no-op until same domain.
  function readSession(){
    try{
      var raw=localStorage.getItem("sb-nxjbpgnpblqepathojzr-auth-token");
      if(!raw) return null;
      if(raw.indexOf("base64-")===0){ raw=decodeURIComponent(escape(atob(raw.slice(7)))); }
      var s=JSON.parse(raw);
      if(s && s.access_token && s.user && s.user.id) return s;
    }catch(e){}
    return null;
  }
  var sess=readSession();
  if(!sess) return; // logged-out shell stands

  // Logged in: flip to Account, fetch tier + admin
  var auth=$("ppyAuth"), authM=$("ppyAuthM");
  if(auth) auth.textContent="Account";
  if(authM) authM.textContent="Account";
  fetch(SB+"/rest/v1/profiles?select=tier,is_admin&id=eq."+encodeURIComponent(sess.user.id),
        {headers:{apikey:KEY,Authorization:"Bearer "+sess.access_token}})
    .then(function(r){return r.ok?r.json():[];})
    .then(function(rows){
      var p=(rows&&rows[0])||{};
      if(p.tier){ var t=$("ppyTier"); if(t){ t.textContent=p.tier; t.hidden=false; } }
      if(p.is_admin){
        var a=$("ppyAdmin"); if(a) a.hidden=false;
        var am=$("ppyAdminM"); if(am) am.hidden=false;
      }
    }).catch(function(){});
})();
</script>
</body>
</html>
